server:
  port: 8080

spring:
  application:
    name: dream-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

dream:
  jwt:
    issuer: dream-miniapp
  ai:
    default-provider: deepseek
