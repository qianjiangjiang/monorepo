server:
  address: 0.0.0.0
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: dream-backend
  datasource:
    url: ${DREAM_DB_URL:jdbc:mysql://localhost:3306/dream?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DREAM_DB_USERNAME:dream}
    password: ${DREAM_DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${DREAM_REDIS_HOST:localhost}
      port: ${DREAM_REDIS_PORT:6379}
      password: ${DREAM_REDIS_PASSWORD:}
  cache:
    type: redis
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

dream:
  jwt:
    issuer: dream-miniapp
    secret: ${DREAM_JWT_SECRET:}
    expiration: 30d
  wx:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}
    content-safety-enabled: ${WECHAT_CONTENT_SAFETY_ENABLED:false}
    code2-session-url: https://api.weixin.qq.com/sns/jscode2session
    access-token-url: https://api.weixin.qq.com/cgi-bin/token
    msg-sec-check-url: https://api.weixin.qq.com/wxa/msg_sec_check
    timeout: 5s
  interpret:
    daily-free-limit: ${DREAM_INTERPRET_DAILY_FREE_LIMIT:5}
    cache-ttl-seconds: ${DREAM_INTERPRET_CACHE_TTL_SECONDS:86400}
  admin:
    username: ${DREAM_ADMIN_USERNAME:}
    password: ${DREAM_ADMIN_PASSWORD:}
  rate-limit:
    default-window: 60s
  ai:
    default-provider: deepseek
    encryption-key: ${DREAM_AI_ENCRYPTION_KEY:${DREAM_AI_CONFIG_SECRET:}}
